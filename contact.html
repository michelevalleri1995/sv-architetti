<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SV Architetti — Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-loading">
  <header class="site-header">
    <div class="site-header__top">
      <a href="index.html" class="site-header__logo">SV Architetti</a>
    </div>
    <div class="site-header__nav-wrap">
      <nav class="site-header__nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="main main--contact">
    <h1 class="page-title">Contact</h1>

    <div class="contact__layout">
      <div class="contact-info">
        <div class="contact-info__block">
          <p class="contact-info__label">Email</p>
          <p class="contact-info__value"><a href="mailto:sara@svarchitetti.com">sara@svarchitetti.com</a></p>
        </div>
        <div class="contact-info__block">
          <p class="contact-info__label">Phone</p>
          <p class="contact-info__value"><a href="tel:+393514319113">+39 351 431 9113</a></p>
        </div>
        <div class="contact-info__block">
          <p class="contact-info__label">Location</p>
          <p class="contact-info__value">Milano</p>
        </div>
        <div class="contact-info__block">
          <p class="contact-info__label">P.IVA</p>
          <p class="contact-info__value">04362550164</p>
        </div>
      </div>

      <div class="contact-form">
        <p class="contact-form__intro">Have a project in mind? We'd love to hear about it.</p>
        <div class="contact-form__wrap">
          <div class="contact-form__field">
            <label for="contact-name">Name</label>
            <input type="text" id="contact-name" name="name" placeholder="Your name" autocomplete="name">
          </div>
          <div class="contact-form__field">
            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" name="email" placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="contact-form__field">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" placeholder="Tell us about your project" rows="5"></textarea>
          </div>
          <button type="button" class="contact-form__submit" onclick="/* future JS */">Send</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__text">© 2025 SV Architetti</p>
      <p class="site-footer__text">Milan</p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
